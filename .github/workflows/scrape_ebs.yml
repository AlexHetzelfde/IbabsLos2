name: Scrape EBS uitval
on:
  workflow_dispatch:
concurrency:
  group: scrape-ebs
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dependencies installeren
        run: pip install beautifulsoup4 --break-system-packages
      - name: Data-map aanmaken
        run: mkdir -p data
      - name: Startdatum besluiten bepalen (sinds laatste scrape)
        if: ${{ github.event.inputs.vanaf == '' }}
        run: |
          if [ -f data/.last_scrape_besluiten ]; then
            SCRAPE_VANAF=$(cat data/.last_scrape_besluiten)
            echo "Vorige scrape-tracker gevonden: vanaf $SCRAPE_VANAF"
          else
            SCRAPE_VANAF=$(date -u -d '15 minutes ago' +'%Y-%m-%d')
            echo "Geen tracker gevonden (eerste run) — val terug op vandaag: $SCRAPE_VANAF"
          fi
          echo "SCRAPE_VANAF=$SCRAPE_VANAF" >> $GITHUB_ENV
        shell: bash
      - name: Besluiten scrapen (camera's & woningsluitingen)
        run: python scrape_besluiten.py
        env:
          SCRAPE_VANAF: ${{ env.SCRAPE_VANAF || github.event.inputs.vanaf }}
        continue-on-error: true
      - name: Besluiten-tracker bijwerken
        run: date -u +'%Y-%m-%d' > data/.last_scrape_besluiten
      - name: EBS uitval scrapen
        run: python scrape_ebs.py
        continue-on-error: true
      - name: Wijzigingen committen en pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILES=""
          for f in data/ebs_uitval.json data/ebs_totaal_teller.json data/ebs_percentage_historie.json data/cameras_actief.json data/cameras_geschiedenis.json data/woningsluitingen.json data/.last_scrape_besluiten; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -z "$FILES" ]; then
            echo "Geen databestanden gevonden om te committen, overslaan."
            exit 0
          fi
          git add $FILES
          git diff --staged --quiet || git commit -m "ebs+besluiten: update $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          git push
