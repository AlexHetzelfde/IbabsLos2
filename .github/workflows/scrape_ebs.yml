name: Scrape EBS uitval
on:
  workflow_dispatch:
concurrency:
  group: scrape-ebs
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dependencies installeren
        run: pip install beautifulsoup4 --break-system-packages
      - name: Data-map aanmaken
        run: mkdir -p data
      - name: Startdatum besluiten bepalen (sinds laatste scrape)
        if: ${{ github.event.inputs.vanaf == '' }}
        run: |
          if [ -f data/.last_scrape_besluiten ]; then
            SCRAPE_VANAF=$(cat data/.last_scrape_besluiten)
            echo "Vorige scrape-tracker gevonden: vanaf $SCRAPE_VANAF"
          else
            SCRAPE_VANAF=$(date -u -d '15 minutes ago' +'%Y-%m-%d')
            echo "Geen tracker gevonden (eerste run) — val terug op vandaag: $SCRAPE_VANAF"
          fi
          echo "SCRAPE_VANAF=$SCRAPE_VANAF" >> $GITHUB_ENV
        shell: bash
      - name: Besluiten scrapen (camera's & woningsluitingen)
        run: python scrape_besluiten.py
        env:
          SCRAPE_VANAF: ${{ env.SCRAPE_VANAF || github.event.inputs.vanaf }}
        continue-on-error: true
      - name: Besluiten-tracker bijwerken
        run: date -u +'%Y-%m-%d' > data/.last_scrape_besluiten
      - name: EBS uitval scrapen
        run: python scrape_ebs.py
        continue-on-error: true
      - name: Wijzigingen committen en pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILES=""
          for f in data/ebs_uitval.json data/ebs_totaal_teller.json data/ebs_percentage_historie.json data/cameras_actief.json data/cameras_geschiedenis.json data/woningsluitingen.json data/.last_scrape_besluiten; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -z "$FILES" ]; then
            echo "Geen databestanden gevonden om te committen, overslaan."
            exit 0
          fi
          git add $FILES
          if git diff --staged --quiet; then
            echo "Geen wijzigingen om te committen, overslaan."
            exit 0
          fi
          git commit -m "ebs+besluiten: update $(date +'%Y-%m-%d %H:%M')"
          # Retry-logica: scrape.yml (raadsdata) en deze workflow draaien
          # onafhankelijk van elkaar en kunnen dus tegelijk pushen. Bij een
          # botsing opnieuw pullen/rebasen en tot 5x proberen, met oplopende
          # wachttijd, voordat de stap alsnog faalt.
          MAX_POGINGEN=5
          WACHTTIJDEN=(3 6 12 20 30)
          for ((poging=1; poging<=MAX_POGINGEN; poging++)); do
            if git push; then
              echo "Push gelukt (poging $poging)"
              break
            fi
            if [ "$poging" -eq "$MAX_POGINGEN" ]; then
              echo "Push definitief mislukt na $MAX_POGINGEN pogingen"
              exit 1
            fi
            wacht=${WACHTTIJDEN[$((poging-1))]}
            echo "Push mislukt (poging $poging/$MAX_POGINGEN) — ${wacht}s wachten en opnieuw pullen/rebasen"
            sleep "$wacht"
            git pull --rebase --autostash
          done
      - name: Deploy triggeren
        if: success()
        run: gh workflow run static.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
