name: Scrape EBS uitval
on:
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dependencies installeren
        run: pip install beautifulsoup4 --break-system-packages
      - name: Data-map aanmaken
        run: mkdir -p data
      - name: EBS uitval scrapen
        run: python scrape_ebs.py
        continue-on-error: true
      - name: Bekendmakingen scrapen
        run: python scrape_rss.py
        continue-on-error: true
      - name: Wijzigingen committen en pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILES=""
          [ -f data/ebs_uitval.json ] && FILES="$FILES data/ebs_uitval.json"
          [ -f data/bekendmakingen.json ] && FILES="$FILES data/bekendmakingen.json"

          if [ -z "$FILES" ]; then
            echo "Geen databestanden gevonden om te committen, overslaan."
            exit 0
          fi

          git add $FILES
          git diff --staged --quiet || git commit -m "ebs+rss: update $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          git push
