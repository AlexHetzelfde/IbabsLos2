name: Scrape raadsdata
on:
  workflow_dispatch:
    inputs:
      vanaf:
        description: 'Ophalen vanaf datum (YYYY-MM-DD) — leeg = standaard (8 uur terug)'
        required: false
        default: ''
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dependencies installeren
        run: pip install pypdf --break-system-packages
      - name: Dynamische startdatum (8 uur terug)
        if: ${{ github.event.inputs.vanaf == '' }}
        run: |
          echo "SCRAPE_VANAF=$(date -u -d '8 hours ago' +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
        shell: bash
      - name: Data-map aanmaken
        run: mkdir -p data
      - name: Moties scrapen
        run: python scrape_moties.py
        env:
          SCRAPE_VANAF: ${{ env.SCRAPE_VANAF || github.event.inputs.vanaf }}
        continue-on-error: true
      - name: Vergaderingen scrapen
        run: python scrape_vergaderingen.py
        env:
          SCRAPE_VANAF: ${{ env.SCRAPE_VANAF || github.event.inputs.vanaf }}
        continue-on-error: true
      - name: Stemmingen scrapen
        run: python scrape_stemmingen.py
        env:
          SCRAPE_VANAF: ${{ env.SCRAPE_VANAF || github.event.inputs.vanaf }}
        continue-on-error: true
      - name: Collegeberichten scrapen
        run: python scrape_collegeberichten.py
        env:
          SCRAPE_VANAF: ${{ env.SCRAPE_VANAF || github.event.inputs.vanaf }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true
      - name: Wijzigingen committen en pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Geen wijzigingen om te committen, overslaan."
            exit 0
          fi
          git commit -m "data: update $(date +'%Y-%m-%d')${SCRAPE_VANAF:+ (backfill vanaf $SCRAPE_VANAF)}"
          git pull --rebase --autostash
          git push
        env:
          SCRAPE_VANAF: ${{ env.SCRAPE_VANAF || github.event.inputs.vanaf }}
